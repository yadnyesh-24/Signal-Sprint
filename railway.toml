[build]
# Tell Railway to look inside the /backend subfolder for the Dockerfile
dockerfilePath = "backend/Dockerfile"

[deploy]
# /health responds IMMEDIATELY (even before model finishes loading)
# This prevents Railway from timing out during the ~4-5 min YOLO model load
healthcheckPath = "/health"
# 10 minute timeout as an extra safety net
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
